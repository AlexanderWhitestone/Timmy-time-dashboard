# ── Timmy Time — Dev-mode overlay ────────────────────────────────────────────
#
# Enables hot-reload: Python, template, and CSS changes auto-apply.
#
# Usage:
#   make up DEV=1
#   # or directly:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build

services:
  dashboard:
    command:
      - uvicorn
      - dashboard.app:app
      - --host=0.0.0.0
      - --port=8000
      - --reload
      - --reload-dir=/app/src
      - --reload-include=*.html
      - --reload-include=*.css
      - --reload-include=*.js
    environment:
      DEBUG: "true"
