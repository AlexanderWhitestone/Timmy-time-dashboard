# ── Timmy Time — Dev-mode overlay ────────────────────────────────────────────
#
# Uses the lightweight dev Dockerfile with hot-reload and bind mounts.
#
# Usage:
#   make up DEV=1
#   # or directly:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      # Bind mount source for hot-reload (changes reflect instantly)
      - ./src:/app/src
      - ./static:/app/static
      - ./tests:/app/tests
    command:
      - uvicorn
      - dashboard.app:app
      - --host=0.0.0.0
      - --port=8000
      - --reload
      - --reload-dir=/app/src
      - --reload-include=*.html
      - --reload-include=*.css
      - --reload-include=*.js
    environment:
      DEBUG: "true"
